services:

  postgres:
    image: pgvector/pgvector:pg18-bookworm
    restart: unless-stopped
    ports:
      - "${POSTGRES_BIND_HOST:-127.0.0.1}:${POSTGRES_HOST_PORT:-5432}:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-ragdb}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - RAG_DB_OWNER_PASS=${RAG_DB_OWNER_PASS:?RAG_DB_OWNER_PASS is required}
      - RAG_DB_PASS=${RAG_DB_PASS:?RAG_DB_PASS is required}
      - RAG_DB_RO_PASS=${RAG_DB_RO_PASS:?RAG_DB_RO_PASS is required}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ragdb}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  rag-server:
    build: ../docker_mcp-rag/rag-server
    restart: unless-stopped
    ports:
      - "${RAG_PORT:-7071}:7071"
    environment:
      - RAG_DB_HOST=postgres
      - RAG_DB_PORT=5432
      - RAG_DB_NAME=${POSTGRES_DB:-ragdb}
      - RAG_DB_USER=${RAG_DB_USER:-rag_app}
      - RAG_DB_PASS=${RAG_DB_PASS:?RAG_DB_PASS is required}
      - EMBED_MODEL=${EMBED_MODEL:-BAAI/bge-m3}
      - PORT=7071
      - STRICT_PORT=false
    volumes:
      - hf_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7071/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  mcp-server:
    build: ../docker_mcp-rag/mcp-server
    restart: unless-stopped
    ports:
      - "${MCP_PORT:-3000}:3000"
    environment:
      - RAG_SERVER_URL=http://rag-server:7071
      - MCP_HOST=0.0.0.0
      - MCP_PORT=3000
    depends_on:
      rag-server:
        condition: service_healthy

volumes:
  postgres_data:
  hf_cache:
